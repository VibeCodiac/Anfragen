<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lass uns was machen!</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="top-bar"></div>
<div class="icon-row">🍺 ☀️ 🚲 🎉</div>

<!-- Zugangscode-Sperre -->
<div class="card" id="gate-card">
  <h1>🔐 Zugang</h1>
  <p class="sub">Gib die Zahl ein, die du bekommen hast.</p>
  <label for="gate-input">Zahl (1–100)</label>
  <input type="number" id="gate-input" min="1" max="100" placeholder="z. B. 42" class="big-input" />
  <button class="submit-btn" id="gate-btn">Bestätigen</button>
  <div class="status" id="gate-status"></div>
  <p style="text-align:center; margin-top:16px;">
    <a href="admin.html" style="color:#888; font-size:0.8rem; text-decoration:underline;">Admin-Bereich</a>
  </p>
</div>

<!-- Hauptinhalt (erst nach richtigem Code sichtbar) -->
<div class="card" id="main-content" style="display:none;">
  <div class="photo-wrap" id="photo-wrap">
    <span class="placeholder">📷</span>
  </div>

  <h1 id="headline">Hey <span id="name">…</span>! Lass uns mal wieder was machen.</h1>
  <p class="sub">Passt dir <strong id="date">…</strong>?</p>

  <div class="toggle">
    <button id="btn-ja">Ja 🎉</button>
    <button id="btn-nein">Nein</button>
  </div>

  <div class="alt-box" id="alt-box">
    <label for="alt-date">Wann passt es dir stattdessen?</label>
    <input type="datetime-local" id="alt-date" />
  </div>

  <label for="msg">Gruß da lassen</label>
  <textarea id="msg"></textarea>

  <button class="submit-btn" id="submit-btn" disabled>Antwort senden</button>

  <div class="status" id="status"></div>

  <button class="submit-btn btn-outline" id="wheel-btn" style="margin-top:14px;">🎡 Aktivität auslosen</button>

  <div class="recent" id="recent-box" style="display:none;">
    <h3>Bisherige Rückmeldungen</h3>
    <div class="responses-list" id="responses-list"></div>
  </div>
</div>

<footer class="admin-link" id="footer-signature" style="display:none;">
  <p class="signature">LG, Stephan</p>
  <a href="admin.html">Admin-Bereich</a>
</footer>

<!-- Kalender-Popup -->
<div class="popup-overlay" id="popup-overlay">
  <div class="popup-box">
    <div class="emoji">📅</div>
    <h2>Termin im Kalender speichern?</h2>
    <p id="popup-text"></p>
    <button class="submit-btn" id="popup-add-btn">Zum Kalender hinzufügen</button>
    <button class="submit-btn btn-outline" id="popup-close-btn">Schließen</button>
  </div>
</div>

<!-- Glücksrad-Popup -->
<div class="popup-overlay" id="wheel-overlay">
  <div class="popup-box">
    <h2>Eure Aktivität ist...</h2>
    <div class="wheel-result" id="wheel-result">🎲</div>
    <p id="wheel-label" style="font-weight:700; min-height:24px;"></p>
    <button class="submit-btn" id="wheel-spin-btn">🎡 Nochmal drehen</button>
    <button class="submit-btn btn-outline" id="wheel-close-btn">Schließen</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
