<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin – Einladung verwalten</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="top-bar"></div>
<div class="icon-row">🚲 🍺 ☀️</div>

<div class="card admin-card" id="login-card">
  <h1>🔒 Admin-Login</h1>
  <p class="sub">Bitte Passwort eingeben.</p>
  <label for="pw">Passwort</label>
  <input type="password" id="pw" placeholder="Passwort" />
  <button class="submit-btn" id="login-btn">Einloggen</button>
  <div class="status" id="login-status"></div>
</div>

<div class="card admin-card hidden" id="admin-card">
  <h1>⚙️ Admin-Bereich</h1>

  <div class="section">
    <h2>Foto &amp; Text aktualisieren</h2>
    <label for="up-name">Name der Person</label>
    <input type="text" id="up-name" placeholder="z. B. Lisa" />
    <label for="up-date">Vorgeschlagenes Datum</label>
    <input type="date" id="up-date" />
    <label for="up-photo">Foto auswählen</label>
    <input type="file" id="up-photo" accept="image/*" />
    <button class="submit-btn" id="upload-btn">Speichern</button>
    <div class="status" id="upload-status"></div>
    <button class="submit-btn btn-outline" id="cal-btn" style="margin-top:10px;">📅 Termin in eigenen Kalender speichern</button>
  </div>

  <div class="section">
    <h2>Rückmeldungen</h2>
    <div class="responses-list" id="admin-responses"></div>
    <button class="submit-btn btn-secondary" id="reset-btn" style="margin-top:12px;">Alles zurücksetzen 🔄</button>
    <div class="status" id="reset-status"></div>
  </div>
</div>

<footer class="admin-link"><a href="index.html">← zurück zur Einladung</a></footer>

<script src="admin.js"></script>
</body>
</html>
